site_name: Carl Harvey — Ops Runbooks
site_url: https://ops.carlharvey.dev
site_description: Infrastructure runbooks and architecture docs

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: cyan
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Projects:
    - DevOps Project: projects/devops-project/index.md
    - Home Server: projects/home-server/index.md
    - DevOps Portfolio: projects/devops-portfolio/index.md
    - Geostrap: projects/geostrap/index.md
  - Infrastructure:
    - AWS: infrastructure/aws/index.md
    - Home Server: infrastructure/home-server/index.md
    - VMs: infrastructure/home-server/vms/index.md
  - Runbooks: runbooks/index.md
  - Incidents: incidents/index.md
  - Architecture: architecture/index.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
